<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iF2006</title>
    <style>
        /* ============================================
           Win2000 / 2000年代初頭レトロデザイン
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'MS Sans Serif', 'Segoe UI', sans-serif;
        }

        body {
            background: #005a8c; /* クラシックなアクティブデスクトップの青 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ブラウザ本体（窓） */
        .window {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: #d4d0c8; /* クラシックWin2000の背景グレー */
            border: 2px solid #ffffff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        /* --- タイトルバー（キャプション） --- */
        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 6px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            border-bottom: 2px solid #ffffff;
            cursor: default;
        }
        .title-bar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-bar .brand span:first-child {
            background: #c0c0c0;
            color: #000;
            padding: 0 8px;
            font-size: 12px;
            border: 1px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
        }
        .title-bar .win-buttons {
            display: flex;
            gap: 4px;
        }
        .title-bar .win-buttons div {
            width: 22px;
            height: 22px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            text-align: center;
            line-height: 18px;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        .title-bar .win-buttons div:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .title-bar .win-buttons .close {
            background: #c0c0c0;
        }
        .title-bar .win-buttons .close:active {
            background: #a00000;
            color: white;
        }

        /* --- ツールバー＆アドレスバー --- */
        .toolbar {
            background: #d4d0c8;
            padding: 6px 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            border-bottom: 2px solid #ffffff;
        }
        .toolbar button {
            background: #d4d0c8;
            border: 2px solid #fff;
            border-right-color: #404040;
            border-bottom-color: #404040;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            min-width: 36px;
            transition: none;
        }
        .toolbar button:active {
            border: 2px solid #404040;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .toolbar input[type="text"] {
            flex: 1;
            min-width: 150px;
            background: #fff;
            border: 2px solid #404040;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 4px 6px;
            font-size: 13px;
            height: 28px;
            outline: none;
        }
        .toolbar input[type="text"]:focus {
            background: #fffff0;
        }
        .toolbar .status-text {
            font-size: 12px;
            color: #444;
            background: #e0ddd5;
            padding: 2px 8px;
            border: 1px solid #404040;
            border-right-color: #fff;
            border-bottom-color: #fff;
            white-space: nowrap;
        }

        /* --- iframe（Web表示エリア） --- */
        .browser-area {
            flex: 1;
            background: #ffffff;
            border: 2px solid #404040;
            border-right-color: #fff;
            border-bottom-color: #fff;
            margin: 4px 8px 8px 8px;
            position: relative;
            overflow: hidden;
        }
        .browser-area iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* --- ステータスバー（下部） --- */
        .status-bar {
            background: #d4d0c8;
            padding: 4px 10px;
            border-top: 2px solid #ffffff;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #444;
            border-bottom: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #404040;
            margin: 0 8px 8px 8px;
            background: #e0ddd5;
            min-height: 26px;
        }
        .status-bar .left {
            display: flex;
            gap: 20px;
        }
        .status-bar .left span {
            border-right: 1px solid #aaa;
            padding-right: 20px;
        }
        .status-bar .right {
            color: #000080;
            font-weight: bold;
        }
        /* 206エラー風の赤い警告 */
        .status-bar .err-206 {
            color: #a00000;
            font-weight: bold;
            background: #ffdddd;
            padding: 0 6px;
            border: 1px solid #a00000;
        }
    </style>
</head>
<body>

<div class="window">
    <!-- タイトルバー -->
    <div class="title-bar">
        <div class="brand">
            <span>🖥️</span>
            <span>iF2006 - インターネット エクスプローラ</span>
            <span style="font-size:11px; color:#aaddff; margin-left:10px;">
                ⚡ 206 Partial Content
            </span>
        </div>
        <div class="win-buttons">
            <div>_</div>
            <div>□</div>
            <div class="close" onclick="alert('終了しますか？\n（このウィンドウを閉じてください）')">✕</div>
        </div>
    </div>

    <!-- ツールバー + アドレスバー -->
    <div class="toolbar">
        <button onclick="goBack()" title="戻る">◀</button>
        <button onclick="goForward()" title="進む">▶</button>
        <button onclick="reloadPage()" title="更新">↻</button>
        <button onclick="goHome()" title="ホーム">🏠</button>
        <input type="text" id="addressBar" value="https://www.duckduckgo.com" 
               placeholder="URLを入力..." 
               onkeydown="if(event.key==='Enter') navigate()">
        <button onclick="navigate()" style="background:#000080; color:white; border-color:#fff #404040 #404040 #fff;">
            GO!
        </button>
        <span class="status-text" id="loadStatus">接続待機中</span>
    </div>

    <!-- iframe 表示エリア -->
    <div class="browser-area">
        <iframe id="browserFrame" src="https://www.duckduckgo.com"></iframe>
    </div>

    <!-- ステータスバー -->
    <div class="status-bar">
        <div class="left">
            <span id="statusLeft">🟢 ローカル イントラネット</span>
            <span id="statusMiddle">セキュリティ: 混合</span>
        </div>
        <div class="right" id="statusRight">
            ⚡ iF2006 / ビルド 206
        </div>
    </div>
</div>

<script>
    // ============================================
    // iF2006 ブラウザ エンジン (JavaScript)
    // ============================================

    const frame = document.getElementById('browserFrame');
    const addressBar = document.getElementById('addressBar');
    const loadStatus = document.getElementById('loadStatus');
    const statusLeft = document.getElementById('statusLeft');

    // ホームページ
    const HOME_URL = 'https://www.duckduckgo.com';

    // ナビゲーション関数
    function navigate(url) {
        let target = url || addressBar.value.trim();
        if (!target) return;

        // プロトコルがなければ https を付与 (2000年代風に httpも考慮)
        if (!target.startsWith('http://') && !target.startsWith('https://')) {
            target = 'https://' + target;
        }

        addressBar.value = target;
        loadStatus.textContent = '⏳ 読み込み中... (206 進行中)';
        statusLeft.textContent = '🔄 接続先: ' + new URL(target).hostname;

        // iframeに読み込み
        frame.src = target;

        // iframeの読み込み完了/エラーを検知 (簡易)
        frame.onload = function() {
            loadStatus.textContent = '✅ 読み込み完了 (206 Partial)';
            // 2000年代初頭風に「完了」の文字を出す
            statusLeft.textContent = '🟢 ' + new URL(frame.src).hostname + ' - 接続中';
            // タイトルを取得しようとする (クロスオリジンだと取れないので注意)
            try {
                document.title = 'iF2006 - ' + frame.contentWindow.document.title;
            } catch (e) {
                // クロスオリジンは無視
            }
        };
        frame.onerror = function() {
            loadStatus.textContent = '❌ エラー: 206 中途半端状態 (読み込めません)';
            statusLeft.textContent = '🔴 接続失敗 - 対象サーバーがiframeを拒否';
        };
    }

    // 各ボタンの動作
    function goBack() {
        try { frame.contentWindow.history.back(); } catch(e) { alert('戻れません (クロスドメイン制限)'); }
    }
    function goForward() {
        try { frame.contentWindow.history.forward(); } catch(e) { alert('進めません (クロスドメイン制限)'); }
    }
    function reloadPage() {
        frame.src = frame.src;
        loadStatus.textContent = '↻ 再読み込み中...';
    }
    function goHome() {
        addressBar.value = HOME_URL;
        navigate(HOME_URL);
    }

    // Enterキーで移動 (ツールバーのインプットに既に実装済み)

    // 初期ロード（DuckDuckGoを表示）
    window.onload = function() {
        addressBar.value = HOME_URL;
        navigate(HOME_URL);
        // ステータスバーに遊び心を
        document.querySelector('.status-bar .right').innerHTML = '⚡ iF2006 / ビルド 206 ';
    };

    // 読み込み失敗時のカスタムエラーハンドリング（タイムアウト風）
    // iframeは直接エラーを掴めないので、ステータスはonload/onerrorでカバー
    console.log('🖥️ iF2006 ブラウザ起動 - 2006年へようこそ！');
</script>

</body>
</html>
